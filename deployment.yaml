apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycevente-app
  labels:
    app: keycevente
spec:
  replicas: 2 # On demande 2 instances de ton app pour la Haute Disponibilité
  selector:
    matchLabels:
      app: keycevente
  template:
    metadata:
      labels:
        app: keycevente
    spec:
      containers:
      - name: keycevente-container
        # Remplace par le lien réel de ton image sur Docker Hub ou Google Artifact Registry
        image: europe-west1-docker.pkg.dev/keycevente-gke/keycevente-repo/keycevente-app:v1 
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials # Fait le lien avec le Secret créé à l'Étape 2
              key: DATABASE_URL
        - name: NODE_ENV
          value: "production"
        # Le Healthcheck pour que Kubernetes sache si l'app va bien
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: keycevente-service
spec:
  type: NodePort # Nécessaire pour que le Load Balancer GCP puisse communiquer avec ce service
  selector:
    app: keycevente
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
